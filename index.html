<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hey Karen 💜</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #c3b1e8 0%, #9370db 45%, #7ec8e3 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
    }

    /* Falling hearts */
    .hearts-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .heart {
      position: absolute;
      top: -60px;
      animation: fall linear infinite;
      opacity: 0;
      user-select: none;
    }
    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg);    opacity: 0; }
      8%   { opacity: 0.9; }
      92%  { opacity: 0.7; }
      100% { transform: translateY(110vh) rotate(20deg); opacity: 0; }
    }

    /* Card */
    .card {
      background: rgba(255,255,255,0.93);
      border-radius: 28px;
      padding: 2.2rem 2rem 2.4rem;
      box-shadow: 0 8px 48px rgba(147,112,219,0.3);
      max-width: 420px;
      width: 93%;
      text-align: center;
      position: relative;
      z-index: 1;
      border: 1.5px solid rgba(147,112,219,0.4);
    }

    /* Emoji face */
    #faceEmoji {
      font-size: 72px;
      margin-bottom: 0.4rem;
      transition: transform 0.3s;
      display: block;
      line-height: 1;
    }
    #faceEmoji.bump {
      animation: bump 0.4s ease;
    }
    @keyframes bump {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.25) rotate(-8deg); }
      60%  { transform: scale(0.9) rotate(5deg); }
      100% { transform: scale(1) rotate(0); }
    }

    /* Question */
    .question {
      font-size: 1.28rem;
      font-weight: 900;
      color: #5e35b1;
      margin: 0.8rem 0 1.6rem;
      line-height: 1.5;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-yes {
      background: #9370db;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 38px;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.15rem;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(147,112,219,0.4);
      transition: transform 0.15s, background 0.2s, padding 0.4s, font-size 0.4s;
    }
    .btn-yes:hover { background: #7b57c4; transform: scale(1.06); }

    .btn-no {
      background: white;
      color: #9370db;
      border: 2px solid #9370db;
      border-radius: 50px;
      padding: 12px 28px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: font-size 0.35s, padding 0.35s, color 0.3s, border-color 0.3s;
      white-space: nowrap;
      overflow: hidden;
    }

    /* Runaway */
    .btn-no.runaway {
      position: fixed;
      z-index: 999;
      transition: left 0.12s ease, top 0.12s ease;
      pointer-events: none;
      opacity: 1;
      cursor: default;
    }

    /* Success message */
    .success-msg {
      color: #5e35b1;
      font-size: 1.45rem;
      font-weight: 900;
      margin-top: 0.5rem;
      line-height: 1.45;
    }

    /* Music button */
    .music-btn {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 100;
      background: rgba(255,255,255,0.92);
      border: 2px solid #9370db;
      border-radius: 50px;
      padding: 9px 18px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      color: #9370db;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      box-shadow: 0 2px 12px rgba(147,112,219,0.2);
      transition: background 0.2s, color 0.2s;
    }
    .music-btn:hover { background: #9370db; color: white; }

    /* Confetti */
    #confetti {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 998;
    }
  </style>
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>



<div class="card">
  <span id="faceEmoji">😊</span>
  <p class="question" id="question">Hey Karen, will you go out with me next Thursday? 🥺</p>
  <div class="btn-row" id="btnRow">
    <button class="btn-yes" id="yesBtn" onclick="sayYes()">Yes! 💜</button>
    <button class="btn-no"  id="noBtn"  onclick="sayNo()">No</button>
  </div>
</div>

<button class="music-btn" id="musicBtn" onclick="toggleMusic()">
  <span id="musicIcon">▶</span><span id="musicLabel"> Play Music</span>
</button>

<canvas id="confetti"></canvas>

<script>
  /* Emoji progression: gets sadder with each No */
  const faceStages = ['😊', '😟', '😢', '😭', '😩', '💔'];

  /* Text that goes INTO the No button (question stays the same) */
  const noPhrases = [
    'Are you sure baby?',
    'Please go out with me baby',
    "You're going to make me cry baby",
    'Please beautiful',
    'Last chance amor 🥺',
  ];

  const TOTAL_NOS = 5;
  let noCount = 0;
  let done    = false;

  const yesBtn    = document.getElementById('yesBtn');
  const noBtn     = document.getElementById('noBtn');
  const faceEmoji = document.getElementById('faceEmoji');

  function sayYes() {
    if (done) return;
    done = true;
    noBtn.style.display = 'none';
    faceEmoji.textContent = '🥳';
    triggerBump();
    document.getElementById('question').textContent = "I knew you were going to say yes baby!! 😉💜";
    document.getElementById('btnRow').innerHTML = '<p class="success-msg">It\'s a date! 🥂✨</p>';
    launchConfetti();
  }

  function sayNo() {
    if (done || noCount >= TOTAL_NOS) return;
    noCount++;

    /* Update face emoji */
    faceEmoji.textContent = faceStages[Math.min(noCount, faceStages.length - 1)];
    triggerBump();

    /* Yes grows */
    yesBtn.style.padding  = `${14 + noCount * 7}px ${38 + noCount * 12}px`;
    yesBtn.style.fontSize = `${1.15 + noCount * 0.22}rem`;

    /* No: shrinks and text changes to the phrase */
    noBtn.textContent  = noPhrases[noCount - 1];
    noBtn.style.fontSize = `${Math.max(0.48, 0.9 - noCount * 0.14)}rem`;
    noBtn.style.padding  = `${Math.max(4, 11 - noCount * 2)}px ${Math.max(7, 22 - noCount * 3)}px`;
    noBtn.style.color       = `rgba(147,112,219,${Math.max(0.3, 1 - noCount * 0.14)})`;
    noBtn.style.borderColor = `rgba(147,112,219,${Math.max(0.25, 1 - noCount * 0.14)})`;

    if (noCount >= TOTAL_NOS) {
      done = false; /* yes still works */
      makeRunaway();
    }
  }

  function makeRunaway() {
    const rect = noBtn.getBoundingClientRect();
    noBtn.classList.add('runaway');
    noBtn.style.left = rect.left + 'px';
    noBtn.style.top  = rect.top  + 'px';
    document.body.appendChild(noBtn);

    /* Desktop: dodge on hover */
    noBtn.addEventListener('mousemove', dodge);

    /* Mobile: continuously move every 800ms so it's never tappable */
    dodge();
    setInterval(dodge, 800);
  }

  function dodge() {
    const vw = window.innerWidth, vh = window.innerHeight;
    const bw = noBtn.offsetWidth,  bh = noBtn.offsetHeight;
    noBtn.style.left = (Math.random() * (vw - bw - 24) + 12) + 'px';
    noBtn.style.top  = (Math.random() * (vh - bh - 24) + 12) + 'px';
  }

  function triggerBump() {
    faceEmoji.classList.remove('bump');
    void faceEmoji.offsetWidth;
    faceEmoji.classList.add('bump');
  }

  /* Music — simple YouTube iframe */
  const YT_VIDEO_ID = 'pOmp_bbbeSE';
  let playing = false;
  let ytFrame = null;

  function toggleMusic() {
    if (!ytFrame) {
      ytFrame = document.createElement('iframe');
      ytFrame.src = `https://www.youtube.com/embed/${YT_VIDEO_ID}?autoplay=1&loop=1&playlist=${YT_VIDEO_ID}&controls=0&enablejsapi=0`;
      ytFrame.allow = 'autoplay';
      ytFrame.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;bottom:0;right:0;';
      document.body.appendChild(ytFrame);
      document.getElementById('musicIcon').textContent  = '⏸';
      document.getElementById('musicLabel').textContent = ' Pause Music';
      playing = true;
    } else if (playing) {
      ytFrame.src = '';
      document.getElementById('musicIcon').textContent  = '▶';
      document.getElementById('musicLabel').textContent = ' Play Music';
      playing = false;
    } else {
      ytFrame.src = `https://www.youtube.com/embed/${YT_VIDEO_ID}?autoplay=1&loop=1&playlist=${YT_VIDEO_ID}&controls=0&enablejsapi=0`;
      document.getElementById('musicIcon').textContent  = '⏸';
      document.getElementById('musicLabel').textContent = ' Pause Music';
      playing = true;
    }
  }

  /* Falling hearts */
  const bg = document.getElementById('heartsBg');
  const symbols = ['💜','🩵','💙','🌸','✨','💫','🫶','💕','🌷','⭐'];
  for (let i = 0; i < 32; i++) {
    const el = document.createElement('div');
    el.className = 'heart';
    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    el.style.left               = (Math.random() * 97) + '%';
    el.style.fontSize           = (13 + Math.random() * 16) + 'px';
    el.style.animationDuration  = (5 + Math.random() * 9) + 's';
    el.style.animationDelay     = (Math.random() * 12) + 's';
    bg.appendChild(el);
  }

  /* Confetti */
  function launchConfetti() {
    const canvas = document.getElementById('confetti');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const ctx = canvas.getContext('2d');
    const colors = ['#9370db','#b39ddb','#7ec8e3','#ce93d8','#ffffff','#7b57c4','#c3b1e8'];
    const pieces = Array.from({ length: 160 }, () => ({
      x: Math.random() * canvas.width, y: -20,
      r: Math.random() * 8 + 4,
      d: Math.random() * 40 + 10,
      color: colors[Math.floor(Math.random() * colors.length)],
      tiltAngle: 0, tiltSpeed: Math.random() * 0.1 + 0.05
    }));
    let angle = 0;
    (function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      angle += 0.01;
      pieces.forEach(p => {
        p.tiltAngle += p.tiltSpeed;
        p.y += (Math.cos(angle + p.d) + 2.2) * 1.5;
        p.x += Math.sin(angle) * 1.5;
        const tilt = Math.sin(p.tiltAngle) * 12;
        ctx.beginPath();
        ctx.lineWidth   = p.r / 2;
        ctx.strokeStyle = p.color;
        ctx.moveTo(p.x + tilt + p.r / 4, p.y);
        ctx.lineTo(p.x + tilt, p.y + tilt + p.r / 4);
        ctx.stroke();
        if (p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
      });
      requestAnimationFrame(draw);
    })();
  }
</script>
</body>
</html>
